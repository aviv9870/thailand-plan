<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="טיול תאילנד">
<meta name="theme-color" content="#1D9E75">
<title>תוכנית טיול תאילנד — אביב וריסן</title>
<style>
/* ─── BASE ─────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#F0F4F8;direction:rtl;transition:background .3s,color .3s}

/* ─── DARK MODE ─────────────────────────────────────────── */
body.dark-mode{background:#0F1117;color:#E2E8F0}
body.dark-mode .hdr{background:linear-gradient(135deg,#0D5C43,#082E22)}
body.dark-mode .tab.active{background:#1A2332;color:#4ADE80}
body.dark-mode .day,.dark-mode .gym,.dark-mode .hotel-row,.dark-mode .cost-box,.dark-mode .sum-table,.dark-mode .flight-card{background:#1A2332;box-shadow:0 1px 4px rgba(0,0,0,.4)}
body.dark-mode .act-time,.dark-mode .act-cost{background:#141B27;border-color:#2A3444}
body.dark-mode .act-body{border-color:#2A3444}
body.dark-mode .act{border-color:#2A3444}
body.dark-mode .act-title,.dark-mode .day-title,.dark-mode .gym-name,.dark-mode .hotel-row .name,.dark-mode .cost-title,.dark-mode .fl-time{color:#E2E8F0}
body.dark-mode .act-desc,.dark-mode .gym-desc,.dark-mode .day-date{color:#94A3B8}
body.dark-mode .act-time,.dark-mode .act-cost,.dark-mode .gym-dist,.dark-mode .hotel-row .conf,.dark-mode .hotel-row .paid{color:#64748B}
body.dark-mode .sum-row{border-color:#2A3444}
body.dark-mode .cost-row{border-color:#2A3444}
body.dark-mode .info-box{opacity:.9}
body.dark-mode .day-hdr{background:#1A2332}
body.dark-mode .fl-info{color:#64748B}
body.dark-mode .sec-title{color:#4ADE80}
body.dark-mode .gym-foot{border-color:#2A3444}
body.dark-mode .cost-total{background:#0D5C43}
body.dark-mode .day-num .l{color:rgba(255,255,255,.6)}
body.dark-mode .sum-desc{color:#94A3B8}

/* ─── EDIT MODE ─────────────────────────────────────────── */
body.editable-active [data-edit="true"]{
  outline:2px dashed #1D9E75;
  border-radius:4px;
  background:rgba(29,158,117,.08);
  cursor:text;
  min-width:20px;
  min-height:16px;
  display:inline-block;
}
body.editable-active [data-edit="true"]:focus{
  outline:2px solid #1D9E75;
  background:rgba(29,158,117,.15);
}

/* ─── COMPLETED ACTIVITY ────────────────────────────────── */
.act.completed{opacity:.45}
.act.completed .act-title{text-decoration:line-through;color:#888}

/* ─── COST BOX COLLAPSED ────────────────────────────────── */
.cost-box.collapsed .cost-row,.cost-box.collapsed .cost-total{display:none}
.cost-box.collapsed .cost-title{margin-bottom:0;border-bottom:none;padding-bottom:0}
.cost-title{cursor:pointer;user-select:none;display:flex;justify-content:space-between;align-items:center}
.cost-title::after{content:"▲";font-size:10px;color:#888;transition:transform .2s}
.cost-box.collapsed .cost-title::after{content:"▼"}

/* ─── HEADER ────────────────────────────────────────────── */
.hdr{background:linear-gradient(135deg,#1D9E75,#0A5C44);padding:12px 14px 0;color:#fff;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.hdr-top{display:flex;justify-content:space-between;align-items:flex-start}
.hdr-left .hdr-title{font-size:17px;font-weight:700}
.hdr-left .hdr-sub{font-size:11px;opacity:.75;margin-top:2px}
.hdr-btns{display:flex;gap:6px;align-items:flex-start;flex-shrink:0}
.hdr-btn{background:rgba(255,255,255,.18);border:none;color:#fff;border-radius:20px;padding:5px 11px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:background .2s}
.hdr-btn:active{background:rgba(255,255,255,.35)}
.hdr-btn.edit-active{background:#fff;color:#1D9E75}

/* ─── TABS ──────────────────────────────────────────────── */
.tabs{display:flex;gap:6px;overflow-x:auto;padding:10px 0 0;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:2px;background:transparent;border:none;cursor:pointer;padding:6px 10px;border-radius:10px 10px 0 0;color:rgba(255,255,255,.7);transition:all .15s}
.tab.active{background:#fff}
.tab.active .nm,.tab.active .dt{color:#1A2B22}
.tab .em{font-size:18px}
.tab .nm{font-size:11px;font-weight:600;white-space:nowrap}
.tab .dt{font-size:10px;opacity:.8}

/* ─── PAGE ──────────────────────────────────────────────── */
.page{padding:14px;max-width:640px;margin:0 auto;display:none}
.page.active{display:block}

/* ─── BANNER ────────────────────────────────────────────── */
.banner{border-radius:14px;padding:16px 18px;color:#fff;margin-bottom:14px;overflow:hidden}
.banner h1{font-size:21px;font-weight:800}
.banner .sub{font-size:13px;opacity:.85;margin-top:3px}
.banner .hotel{font-size:12px;opacity:.7;margin-top:2px}

/* ─── INFO BOXES ────────────────────────────────────────── */
.info-box{border-radius:11px;padding:10px 13px;margin-bottom:12px;border-right:4px solid;font-size:13px}

/* ─── HOTEL ROW ─────────────────────────────────────────── */
.hotel-row{background:#fff;border-radius:11px;padding:12px 14px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.07);display:flex;justify-content:space-between;align-items:center}
.hotel-row .name{font-weight:700;font-size:14px}
.hotel-row .conf{font-size:11px;color:#888;margin-top:3px;display:flex;align-items:center;gap:5px}
.hotel-row .cost{font-size:15px;font-weight:800;color:#1D9E75;text-align:left}
.hotel-row .paid{font-size:11px;color:#888;text-align:left}
.copy-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:2px 4px;border-radius:5px;transition:background .15s}
.copy-btn:active{background:rgba(0,0,0,.1)}
.maps-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:2px 4px;border-radius:5px;text-decoration:none;display:inline-block}

/* ─── SECTION TITLE ─────────────────────────────────────── */
.sec-title{font-size:12px;font-weight:700;color:#888;letter-spacing:.5px;margin:14px 0 8px;text-transform:uppercase}
body.dark-mode .sec-title{color:#4ADE80}

/* ─── GYM ───────────────────────────────────────────────── */
.gym{background:#fff;border-radius:11px;padding:12px 14px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.gym.top{border:2px solid #1D9E75}
.gym-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;display:inline-block;margin-bottom:6px}
.gym-name{font-size:14px;font-weight:700;color:#1A2B22;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.gym-desc{font-size:12px;color:#555;line-height:1.5}
.gym-foot{display:flex;justify-content:space-between;align-items:center;margin-top:8px;padding-top:8px;border-top:1px solid #F0F4F8;font-size:12px}
.gym-price{font-weight:700;color:#1D9E75}
.gym-dist{color:#888}

/* ─── DAY CARD ──────────────────────────────────────────── */
.day{background:#fff;border-radius:13px;overflow:hidden;box-shadow:0 1px 5px rgba(0,0,0,.08);margin-bottom:11px}
.day-hdr{display:flex}
.day-num{width:60px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px 6px;flex-shrink:0}
.day-num .n{font-size:22px;font-weight:800;color:#fff}
.day-num .l{font-size:10px;color:rgba(255,255,255,.8);font-weight:500}
.day-info{padding:13px;flex:1}
.day-date{font-size:11px;color:#999;margin-bottom:3px}
.day-title{font-size:15px;font-weight:700;color:#1A2B22}

/* ─── ACTIVITY ──────────────────────────────────────────── */
.act{display:flex;border-top:1px solid #F5F5F5;transition:opacity .25s}
.act-check{width:36px;flex-shrink:0;display:flex;align-items:flex-start;justify-content:center;padding-top:13px;cursor:pointer;font-size:16px;background:#FAFAFA;border-left:1px solid #F0F0F0;user-select:none;transition:background .15s}
.act-check:active{background:#E1F5EE}
.act-time{width:70px;flex-shrink:0;padding:11px 6px;font-size:10px;font-weight:600;color:#888;background:#FAFAFA;text-align:center;border-left:1px solid #F0F0F0}
.act-body{flex:1;padding:11px 12px}
.act-lbl{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;display:inline-block;margin-bottom:5px}
.act-title{font-size:14px;font-weight:700;color:#1A2B22;margin-bottom:3px;transition:text-decoration .2s}
.act-desc{font-size:13px;color:#555;line-height:1.5}
.act-tip{margin-top:7px;font-size:12px;color:#0F6E56;background:#E1F5EE;border-radius:7px;padding:5px 9px}
.act-alt{margin-top:5px;font-size:12px;color:#3C3489;background:#EEEDFE;border-radius:7px;padding:5px 9px}
.act-cost{flex-shrink:0;width:68px;padding:11px 5px;font-size:11px;font-weight:700;color:#1D9E75;background:#FAFAFA;text-align:center;border-right:1px solid #F0F0F0}

/* ─── SUMMARY TABLE ─────────────────────────────────────── */
.sum-table{background:#fff;border-radius:13px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.07);margin-bottom:11px}
.sum-row{display:flex;border-top:1px solid #F5F5F5}
.sum-row:first-child{border-top:none}
.sum-date{width:100px;flex-shrink:0;padding:11px 9px;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;text-align:center}
.sum-desc{flex:1;padding:11px 13px;font-size:13px;color:#444;line-height:1.5}

/* ─── COST BOX ──────────────────────────────────────────── */
.cost-box{background:#fff;border-radius:13px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,.07);margin-bottom:11px}
.cost-title{font-size:14px;font-weight:700;color:#1A2B22;margin-bottom:10px;padding-bottom:9px;border-bottom:1px solid #F0F4F8}
.cost-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #F8F8F8;font-size:13px}
.cost-row:last-child{border-bottom:none}
.cost-val{font-weight:700;color:#1D9E75}
.cost-total{background:#E1F5EE;border-radius:9px;padding:9px 13px;display:flex;justify-content:space-between;margin-top:8px}
.cost-total-l{font-weight:700;color:#0F6E56}
.cost-total-r{font-weight:800;color:#0F6E56;font-size:15px}

/* ─── REMINDER ──────────────────────────────────────────── */
.rem{border-radius:11px;padding:10px 13px;margin-bottom:9px;border-right:4px solid;font-size:13px}

/* ─── FLIGHT CARD ───────────────────────────────────────── */
.flight-card{background:#fff;border-radius:13px;padding:15px;box-shadow:0 1px 4px rgba(0,0,0,.07);margin-bottom:12px}
.fl-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.fl-dir{font-size:11px;font-weight:700;color:#888;width:34px;flex-shrink:0;margin-top:3px}
.fl-time{font-size:15px;font-weight:700;color:#1A2B22}
.fl-info{font-size:12px;color:#888}
.fl-num{font-size:12px;font-weight:700;color:#1D9E75}

/* ─── TOAST ─────────────────────────────────────────────── */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:#1A2B22;color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ─── RESET BUTTON ──────────────────────────────────────── */
.reset-area{padding:24px 14px 40px;text-align:center}
.reset-btn{background:none;border:1px dashed #ccc;color:#aaa;border-radius:20px;padding:7px 20px;font-size:12px;cursor:pointer}
.reset-btn:active{background:#FDECEA;border-color:#e88;color:#c00}
body.dark-mode .reset-btn{border-color:#2A3444;color:#64748B}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <div class="hdr-left">
      <div class="hdr-title">🌏 תוכנית טיול תאילנד</div>
      <div class="hdr-sub">אביב וריסן | דצמבר 2026 — ינואר 2027</div>
    </div>
    <div class="hdr-btns">
      <button class="hdr-btn" id="darkBtn" onclick="toggleDark()">🌙</button>
      <button class="hdr-btn" id="editBtn" onclick="toggleEdit()">✏️ עריכה</button>
    </div>
  </div>
  <div class="tabs" id="tabs"></div>
</div>

<div id="pages"></div>

<div class="reset-area">
  <button class="reset-btn" onclick="resetAll()">🔄 איפוס מלא של כל השינויים</button>
</div>

<div class="toast" id="toast"></div>

<script>
/* ══════════════════════════════════════════════════════════
   DATA
══════════════════════════════════════════════════════════ */
var DESTS=[
  {id:"flight",  nm:"טיסה",       em:"✈️", dt:"14–15/12", color:"#2C3E50"},
  {id:"cm",      nm:"צ׳יאנג מאי", em:"🐘", dt:"15–22/12", nights:7,  color:"#1D9E75", hotel:"Moondragon Hotel",         cost:"1,260 ₪", paid:"אביב", conf:"652782383"},
  {id:"pai",     nm:"פאי",         em:"🏔️", dt:"22–26/12", nights:4,  color:"#7B5EA7", hotel:"Canary Guesthouse",         cost:"560 ₪",   paid:"אביב", conf:"6469925220"},
  {id:"phuket",  nm:"פוקט",        em:"🌊", dt:"26/12–2/1",nights:7,  color:"#E07B39", hotel:"Travelodge Phuket Town",    cost:"1,160 ₪", paid:"ריסן", conf:"2012371221"},
  {id:"krabi",   nm:"קראבי",       em:"🏝️", dt:"2–7/1",   nights:5,  color:"#185FA5", hotel:"Sea Seeker Krabi",          cost:"2,290 ₪", paid:"אביב", conf:"2011620922"},
  {id:"samui",   nm:"קוסמוי",      em:"🌴", dt:"7–11/1",  nights:4,  color:"#BA7517", hotel:"Silavadee Pool Spa Resort", cost:"2,850 ₪", paid:"אביב", conf:"558149442"},
  {id:"phangan", nm:"קופנגן",      em:"🌙", dt:"11–17/1", nights:6,  color:"#0F6E56", hotel:"Explorar Koh Phangan",      cost:"1,800 ₪", paid:"אביב", conf:"1357241590"},
  {id:"bkk",     nm:"בנגקוק",      em:"🏙️", dt:"17–21/1", nights:4,  color:"#C0392B", hotel:"Sindhorn Midtown Hotel",    cost:"TBD",     paid:"—",   conf:"ממתין"}
];

var active="cm";
var editMode=false;

/* ══════════════════════════════════════════════════════════
   SMART DATE — auto-select destination
══════════════════════════════════════════════════════════ */
window.addEventListener("load",function(){
  // Dark mode
  if(localStorage.getItem("dark_mode")==="1") document.body.classList.add("dark-mode");

  // Smart destination detection
  var now=new Date();
  var y=now.getFullYear(), m=now.getMonth()+1, day=now.getDate();
  var autoId=null;
  if(y===2026&&m===12&&day>=15&&day<=21) autoId="cm";
  else if(y===2026&&m===12&&day>=22&&day<=25) autoId="pai";
  else if((y===2026&&m===12&&day>=26)||(y===2027&&m===1&&day<=1)) autoId="phuket";
  else if(y===2027&&m===1&&day>=2&&day<=6) autoId="krabi";
  else if(y===2027&&m===1&&day>=7&&day<=10) autoId="samui";
  else if(y===2027&&m===1&&day>=11&&day<=16) autoId="phangan";
  else if(y===2027&&m===1&&day>=17&&day<=21) autoId="bkk";
  if(autoId){active=autoId;}

  render();
});

/* ══════════════════════════════════════════════════════════
   DARK MODE
══════════════════════════════════════════════════════════ */
function toggleDark(){
  document.body.classList.toggle("dark-mode");
  localStorage.setItem("dark_mode",document.body.classList.contains("dark-mode")?"1":"0");
}

/* ══════════════════════════════════════════════════════════
   EDIT MODE
══════════════════════════════════════════════════════════ */
function toggleEdit(){
  if(!editMode){
    editMode=true;
    document.body.classList.add("editable-active");
    document.getElementById("editBtn").textContent="🔒 שמור";
    document.getElementById("editBtn").classList.add("edit-active");
    // Make all data-edit elements editable
    document.querySelectorAll("[data-edit]").forEach(function(el){
      el.contentEditable="true";
    });
    showToast("מצב עריכה פעיל — ערוך ישירות כל טקסט");
  } else {
    editMode=false;
    document.body.classList.remove("editable-active");
    document.getElementById("editBtn").textContent="✏️ עריכה";
    document.getElementById("editBtn").classList.remove("edit-active");
    document.querySelectorAll("[data-edit]").forEach(function(el){
      el.contentEditable="false";
    });
    // Save current page HTML to localStorage
    var html=document.getElementById("pages").innerHTML;
    localStorage.setItem("html_"+active, html);
    showToast("✅ נשמר! השינויים יישמרו גם בביקור הבא");
  }
}

/* ══════════════════════════════════════════════════════════
   CHECKLIST
══════════════════════════════════════════════════════════ */
function toggleCheck(el){
  var actEl=el.closest(".act");
  var done=actEl.classList.toggle("completed");
  el.textContent=done?"✅":"⬜";
  // Auto-save checklist state
  var html=document.getElementById("pages").innerHTML;
  localStorage.setItem("html_"+active, html);
}

/* ══════════════════════════════════════════════════════════
   COST BOX COLLAPSE
══════════════════════════════════════════════════════════ */
function toggleCost(el){
  el.closest(".cost-box").classList.toggle("collapsed");
}

/* ══════════════════════════════════════════════════════════
   COPY CONFIRMATION NUMBER
══════════════════════════════════════════════════════════ */
function copyConf(num){
  if(navigator.clipboard){
    navigator.clipboard.writeText(num).then(function(){
      showToast("📋 מספר אישור הועתק: "+num);
    });
  } else {
    showToast("מספר אישור: "+num);
  }
}

/* ══════════════════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════════════════ */
var toastTimer=null;
function showToast(msg){
  var t=document.getElementById("toast");
  t.textContent=msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){t.classList.remove("show");},2500);
}

/* ══════════════════════════════════════════════════════════
   RESET
══════════════════════════════════════════════════════════ */
function resetAll(){
  if(confirm("לאפס את כל השינויים חזרה למקור?")){
    localStorage.clear();
    location.reload();
  }
}

/* ══════════════════════════════════════════════════════════
   NAVIGATION
══════════════════════════════════════════════════════════ */
function go(id){
  if(editMode) toggleEdit(); // save before switching
  active=id;
  render();
  window.scrollTo(0,0);
}

/* ══════════════════════════════════════════════════════════
   HTML BUILDERS
══════════════════════════════════════════════════════════ */
function mapsBtn(name){
  var q=encodeURIComponent(name+" Thailand");
  return "<a class='maps-btn' href='http://maps.google.com/?q="+q+"' target='_blank' title='פתח במפות'>📍</a>";
}

function banner(d,sub){
  var ni=d.nights?"<div style='float:left;background:rgba(255,255,255,.2);border-radius:9px;padding:5px 11px;font-size:13px;font-weight:700;margin-top:4px;text-align:center'>"+d.nights+"<br>לילות</div>":"";
  var ht=d.hotel?"<div style='font-size:12px;opacity:.7;margin-top:2px'>🏨 <span data-edit='true'>"+d.hotel+"</span></div>":"";
  var su=sub?"<div style='font-size:12px;opacity:.75;margin-top:2px'><span data-edit='true'>"+sub+"</span></div>":"";
  return "<div class='banner' style='background:linear-gradient(135deg,"+d.color+","+d.color+"cc)'>"+ni+"<h1><span data-edit='true'>"+d.em+" "+d.nm+"</span></h1><div class='sub'><span data-edit='true'>"+d.dt+(d.nights?" · "+d.nights+" לילות":"")+"</span></div>"+ht+su+"</div>";
}

function hotelCard(d){
  if(!d.hotel) return "";
  return "<div class='hotel-row'>"+
    "<div>"+
      "<div class='name'>🏨 <span data-edit='true'>"+d.hotel+"</span> "+mapsBtn(d.hotel)+"</div>"+
      "<div class='conf'>אישור: <span data-edit='true'>"+d.conf+"</span> "+
        "<button class='copy-btn' onclick='copyConf(\""+d.conf+"\")' title='העתק'>📋</button>"+
      "</div>"+
    "</div>"+
    "<div style='text-align:left'>"+
      "<div class='cost'><span data-edit='true'>"+d.cost+"</span></div>"+
      "<div class='paid'>שילם: <span data-edit='true'>"+d.paid+"</span></div>"+
    "</div>"+
  "</div>";
}

function infoBox(txt,color,bg){return "<div class='info-box' style='background:"+bg+";border-color:"+color+";color:"+color+"'><span data-edit='true'>"+txt+"</span></div>";}
function tip(txt){return infoBox("💡 "+txt,"#1D9E75","#E1F5EE");}
function warn(txt){return infoBox("⚠️ "+txt,"#BA7517","#FAEEDA");}
function rem(txt,color,bg){return "<div class='rem' style='background:"+bg+";border-color:"+color+";color:"+color+"'><span data-edit='true'>"+txt+"</span></div>";}
function secTitle(t){return "<div class='sec-title'>"+t+"</div>";}

function gym(top,name,desc,price,dist,note){
  var bg=top?"#E1F5EE":"#EEEDFE",col=top?"#085041":"#3C3489",lbl=top?"🏋️ מומלץ ראשון":"🔄 חלופה";
  var n=note?"<div class='act-tip' style='margin-top:7px'><span data-edit='true'>"+note+"</span></div>":"";
  return "<div class='gym"+(top?" top":"")+"'>"+
    "<span class='gym-badge' style='background:"+bg+";color:"+col+"'>"+lbl+"</span>"+
    "<div class='gym-name'><span data-edit='true'>"+name+"</span> "+mapsBtn(name)+"</div>"+
    "<div class='gym-desc'><span data-edit='true'>"+desc+"</span></div>"+n+
    "<div class='gym-foot'><span class='gym-price'><span data-edit='true'>"+price+"</span></span><span class='gym-dist'><span data-edit='true'>"+dist+"</span></span></div>"+
  "</div>";
}

function act(time,type,title,desc,cost,tipTxt,alt){
  var colors={
    morning:["#FEF3E2","#7A4100","בוקר"],
    noon:["#EEEDFE","#3C3489","צהריים"],
    evening:["#E1F5EE","#085041","ערב"],
    gym:["#EDE8FB","#4B3B9A","🏋️ אימון"],
    arrive:["#E6F1FB","#0C447C","הגעה"]
  };
  var c=colors[type]||["#F0F4F8","#444","—"];
  var t=tipTxt?"<div class='act-tip'>💡 <span data-edit='true'>"+tipTxt+"</span></div>":"";
  var a=alt?"<div class='act-alt'>🔄 חלופה: <span data-edit='true'>"+alt+"</span></div>":"";
  return "<div class='act'>"+
    "<div class='act-check' onclick='toggleCheck(this)'>⬜</div>"+
    "<div class='act-time'><span data-edit='true'>"+time+"</span></div>"+
    "<div class='act-body'>"+
      "<span class='act-lbl' style='background:"+c[0]+";color:"+c[1]+"'>"+c[2]+"</span>"+
      "<div class='act-title'><span data-edit='true'>"+title+"</span></div>"+
      "<div class='act-desc'><span data-edit='true'>"+desc+"</span></div>"+t+a+
    "</div>"+
    "<div class='act-cost'><span data-edit='true'>"+cost+"</span></div>"+
  "</div>";
}

function dayCard(num,date,title,color,acts){
  return "<div class='day'>"+
    "<div class='day-hdr'>"+
      "<div class='day-num' style='background:"+color+"'><div class='n'>"+num+"</div><div class='l'>יום</div></div>"+
      "<div class='day-info'>"+
        "<div class='day-date'><span data-edit='true'>"+date+"</span></div>"+
        "<div class='day-title'><span data-edit='true'>"+title+"</span></div>"+
      "</div>"+
    "</div>"+acts+
  "</div>";
}

function sumTable(rows){
  var h="<div class='sum-table'>";
  rows.forEach(function(r,i){
    var bg=i%2===0?"#E1F5EE":"#EEEDFE",col=i%2===0?"#085041":"#3C3489";
    h+="<div class='sum-row'><div class='sum-date' style='background:"+bg+";color:"+col+"'><span data-edit='true'>"+r[0]+"</span></div><div class='sum-desc'><span data-edit='true'>"+r[1]+"</span></div></div>";
  });
  return h+"</div>";
}

function costBox(title,rows,total){
  var h="<div class='cost-box'>"+
    "<div class='cost-title' onclick='toggleCost(this)'><span data-edit='true'>"+title+"</span></div>";
  rows.forEach(function(r){
    h+="<div class='cost-row'><span data-edit='true'>"+r[0]+"</span><span class='cost-val'><span data-edit='true'>"+r[1]+"</span></span></div>";
  });
  if(total) h+="<div class='cost-total'><span class='cost-total-l'>סה״כ לאדם</span><span class='cost-total-r'><span data-edit='true'>"+total+"</span></span></div>";
  return h+"</div>";
}

/* ══════════════════════════════════════════════════════════
   RENDER
══════════════════════════════════════════════════════════ */
function render(){
  // Render tabs
  document.getElementById("tabs").innerHTML=DESTS.map(function(d){
    var ac=d.id===active?" active":"";
    var col=d.id===active?";color:"+d.color:"";
    return "<button class='tab"+ac+"' onclick='go(\""+d.id+"\")' style='"+col+"'>"+
      "<span class='em'>"+d.em+"</span>"+
      "<span class='nm'>"+d.nm+"</span>"+
      "<span class='dt'>"+d.dt+"</span>"+
    "</button>";
  }).join("");

  // Load from localStorage or generate fresh
  var saved=localStorage.getItem("html_"+active);
  var html=saved||((PAGES[active])?PAGES[active]():"");
  document.getElementById("pages").innerHTML="<div class='page active'>"+html+"</div>";

  // Re-apply edit mode if active
  if(editMode){
    document.querySelectorAll("[data-edit]").forEach(function(el){
      el.contentEditable="true";
    });
  }
}
</script>
